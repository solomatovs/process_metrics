# /etc/sysctl.d/99-process-metrics.conf
#
# Разрешает использование eBPF и perf_event с точечными capabilities
# (CAP_BPF, CAP_PERFMON) вместо CAP_SYS_ADMIN.
#
# Без этих настроек Debian по умолчанию требует CAP_SYS_ADMIN
# для bpf() и perf_event_open(), что обесценивает точечные caps.
#
# Значения:
#   perf_event_paranoid=2  — стандартный upstream (CAP_PERFMON достаточно)
#                            Debian default=3 (только CAP_SYS_ADMIN)
#   unprivileged_bpf_disabled=1 — CAP_BPF достаточно для bpf()
#                                  Debian default=2 (только CAP_SYS_ADMIN)

kernel.perf_event_paranoid = 2
kernel.unprivileged_bpf_disabled = 1
