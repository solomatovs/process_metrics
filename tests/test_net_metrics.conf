# test_net_metrics.conf — конфигурация для тестов сетевых метрик
#
# Отслеживает процессы с маркером NETTEST в cmdline.
# Включён полный сетевой трекинг.

snapshot_interval = 5;
cmdline_max_len = 500;
exec_rate_limit = 0;
log_level = 2;

rules = (
    { name = "nettest"; regex = "NETTEST"; }
);

cgroup_metrics = false;
file_tracking = { enabled = false; };
disk_tracking = { enabled = false; };
docker = { resolve_names = false; };
refresh_proc = false;

net_tracking = {
    enabled = true;
    tcp_bytes = true;
    tcp_retransmit = false;
    tcp_syn = false;
    tcp_rst = false;
    udp_bytes = true;
    tcp_open_conns = true;
};

http_server = {
    port = 19094;
    bind = "127.0.0.1";
    max_buffer_size = 16777216;
};
