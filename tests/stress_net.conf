# stress_net.conf — максимальный сетевой трекинг для стресс-теста
#
# Всё включено для максимальной нагрузки на ring buffer'ы.

# Увеличенные ring buffer'ы для стресс-теста
ring_buffers = {
    net = 33554432;    # 32 МБ (дефолт 4 МБ)
    sec = 16777216;    # 16 МБ (дефолт 1 МБ)
};

snapshot_interval = 3;
log_level = 1;
exec_rate_limit = 0;
refresh_proc = true;
cgroup_metrics = true;

rules = (
    { name = "stress"; regex = "NETSTRESS"; },
    { name = "other";  regex = "."; }
);

net_tracking = {
    enabled = true;
    tcp_bytes = true;
    tcp_retransmit = true;
    tcp_syn = true;
    tcp_rst = true;
    udp_bytes = true;
    tcp_open_conns = true;
};

icmp_tracking = true;

file_tracking = {
    enabled = true;
    track_bytes = true;
    include = ( "/tmp/stress_net" );
};

disk_tracking = { enabled = true; };

http_server = {
    port = 19093;
    bind = "127.0.0.1";
    max_buffer_size = 67108864;
};
