# test_security.conf — конфигурация для интеграционных тестов security_tracking
#
# Отслеживает процессы с маркером SECTEST в cmdline.
# Все security-опции включены для полного покрытия.

snapshot_interval = 5;
cmdline_max_len = 500;
exec_rate_limit = 0;
log_level = 2;

rules = (
    { name = "sectest"; regex = "SECTEST"; }
);

cgroup_metrics = false;
file_tracking = { enabled = false; };
disk_tracking = { enabled = false; };
docker = { resolve_names = false; };
refresh_proc = false;

net_tracking = {
    enabled = true;
    tcp_bytes = true;
    tcp_retransmit = true;
    tcp_syn = true;
    tcp_rst = true;
    udp_bytes = true;
    tcp_open_conns = true;
};

http_server = {
    port = 19092;
    bind = "127.0.0.1";
    max_buffer_size = 16777216;
};
