# stress_test.conf — конфигурация для стресс-тестирования ring buffer'ов
#
# Запуск: sudo ./build/process_metrics -c tests/stress_test.conf
# Нагрузка: bash tests/stress_generate.sh

snapshot_interval = 5;
metric_prefix = "stress_test";
log_level = 2;
exec_rate_limit = 0;
refresh_proc = true;

rules = (
    { name = "stress"; regex = "stress_worker"; },
    { name = "other";  regex = "."; }
);

net_tracking = {
    enabled = true;
    track_bytes = true;
};

file_tracking = {
    enabled = true;
    track_bytes = true;
    include = ( "/tmp/stress_test" );
    exclude = ();
};

security_tracking = {
    tcp_retransmit = true;
    syn_tracking = true;
    rst_tracking = true;
    udp_tracking = false;
    icmp_tracking = false;
    open_conn_count = true;
};
