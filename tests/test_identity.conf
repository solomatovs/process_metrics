# test_identity.conf — конфигурация для тестов identity (uid/loginuid/euid/sessionid)
#
# Отслеживает процессы с маркером IDTEST в cmdline.
# Все опции включены для покрытия всех типов событий.

snapshot_interval = 5;
cmdline_max_len = 500;
exec_rate_limit = 0;
log_level = 2;
refresh_proc = false;
cgroup_metrics = false;

rules = (
    { name = "idtest"; regex = "IDTEST"; }
);

net_tracking = {
    enabled = true;
    tcp_bytes = true;
    tcp_retransmit = true;
    tcp_syn = true;
    tcp_rst = true;
    udp_bytes = true;
    tcp_open_conns = true;
};

file_tracking = {
    enabled = true;
    track_bytes = true;
    include = ( "/tmp/idtest" );
    exclude = ();
};

signal_tracking = true;

docker = { resolve_names = false; };
disk_tracking = { enabled = false; };

http_server = {
    port = 19095;
    bind = "127.0.0.1";
    max_buffer_size = 16777216;
};
