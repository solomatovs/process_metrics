# test_shortlived_snapshot.conf — конфигурация для теста короткоживущих процессов
#
# Проверяет, что все короткоживущие процессы попадают в один snapshot.
# Запуск: bash tests/test_shortlived_snapshot.sh

snapshot_interval = 3;
cmdline_max_len = 500;
exec_rate_limit = 0;
log_level = 1;

rules = (
    { name = "test"; regex = "SNAPMARKER"; }
);

cgroup_metrics = false;
net_tracking = { enabled = false; };
file_tracking = { enabled = false; };
disk_tracking = { enabled = false; };
security_tracking = {
    tcp_retransmit = false;
    syn_tracking = false;
    rst_tracking = false;
    udp_tracking = false;
    icmp_tracking = false;
    open_conn_count = false;
};
docker = { resolve_names = false; };
refresh_proc = false;

http_server = {
    port = 19091;
    bind = "127.0.0.1";
    max_buffer_size = 16777216;
};
