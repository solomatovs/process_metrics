# postgres.conf — правило матчинга для PostgreSQL
#
# Матчит процессы postgres (сервер), НЕ клиентские утилиты.
# Regex требует что cmdline начинается с "postgres" —
# это основной процесс и все его дочерние backend'ы.
#
# Что отслеживается:
#   - postmaster (основной процесс)
#   - checkpointer, bgwriter, walwriter, autovacuum launcher
#   - backend'ы клиентских соединений (появляются/исчезают)
#
# Все метрики: CPU, RSS, IO, ctxsw, page faults, cgroup, exit code.

postgres = /^postgres/
