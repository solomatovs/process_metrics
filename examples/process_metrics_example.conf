# process_metrics — правила матчинга корневых процессов
#
# Формат:  name = /awk_regex_для_cmdline/
#
# Каждое правило ищет корневые процессы через ps -eo pid,args.
# Найденные процессы + всё их дерево потомков отслеживаются.
# Несколько процессов могут матчнуться одним правилом — каждый
# становится отдельным корнем дерева.
#
# Regex — awk-совместимый, применяется к полной cmdline процесса.
# Примеры:
#   /celery@.*MainProcess/      — Airflow Celery worker
#   /bin\/postgres.*-D/         — PostgreSQL postmaster
#   /airflow webserver/         — Airflow webserver
#   /airflow scheduler$/        — Airflow scheduler ($ = конец строки)
#   /dockerd/                   — Docker daemon

# Airflow
airflow_celery    = /celery@.*MainProcess/
airflow_webserver = /airflow webserver/
airflow_scheduler = /airflow scheduler$/
airflow_triggerer = /airflow triggerer/

# PostgreSQL
postgres = /bin\/postgres.*-D/

# Informatica
infa_domain    = /ISPTomcatBootstrap start/
infa_dis       = /DataIntegrationService.*InfaTomcatBootstrap/

# Docker
dockerd = /dockerd/
