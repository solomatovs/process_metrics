# process_metrics — основной файл конфигурации (формат libconfig)
#
# Запуск: ./process_metrics -c process_metrics.conf

# ── Общие настройки ────────────────────────────────────────────────

# Идентификатор сервера (используется в столбце hostname CSV).
# По умолчанию берётся системное имя хоста.
# hostname = "my-server-01";

# Интервал снимков в секундах (как часто собираются метрики живых процессов).
# Меньшие значения дают более высокую детализацию, но увеличивают нагрузку CPU.
# Рекомендации:
#   3-10 сек  — интерактивные дашборды, отладка
#   30-60 сек — production-мониторинг с минимальными накладными расходами
snapshot_interval = 3;

# Интервал обновления /proc данных (секунды). По умолчанию = snapshot_interval.
# Чем чаще — тем быстрее обнаруживаются новые процессы и обновляются cmdline.
refresh_interval = 1;

# Максимальная длина командной строки: 512 байт (compile-time, CMDLINE_MAX).
# Покрывает >99% реальных cmdline. Ограничение BPF верификатора.

# Ограничение частоты событий exec в секунду (0 = без ограничения).
# При fork-storm'ах ядро генерирует тысячи exec/fork в секунду.
# Rate limit отбрасывает лишние exec-события в BPF ring buffer,
# сохраняя snapshot/exit/net/file-события.
exec_rate_limit = 0;

# Уровень логирования: 0 = только ошибки, 1 = информация (по умолчанию), 2 = отладка
log_level = 1;

# ── Правила отслеживания ──────────────────────────────────────────
#
# Список объектов { name, regex, ignore }.
# Регулярное выражение применяется к полной командной строке процесса
# (содержимое /proc/<pid>/cmdline — путь к исполняемому файлу + аргументы).
# При совпадении процесс и все его потомки начинают отслеживаться.
# Первое совпадение побеждает — более конкретные правила должны идти первыми.
# Перезагружаются по SIGHUP без перезапуска.
#
# ignore = true — процесс и его потомки НЕ отслеживаются.
# Используйте для исключения шумных процессов (cron-скрипты, мониторинг).
# Правило с ignore должно стоять ПЕРЕД более общим совпадающим правилом.
#
# Совет: добавьте правило-ловушку { name = "other"; regex = "."; } последним,
# чтобы отслеживать всё, что не попало в предыдущие правила.

rules = (
    # ── инфраструктура хоста ─────────────────────────────────────────
    { name = "sshd";              regex = "sshd:? "; },
    { name = "sssd";              regex = "sssd"; },
    { name = "nginx";             regex = "^nginx: "; },
    { name = "dockerd";           regex = "/usr/bin/dockerd"; },
    { name = "containerd";        regex = "/usr/bin/containerd"; },
    { name = "docker-proxy";      regex = "/usr/bin/docker-proxy"; },
    { name = "containerd-shim";   regex = "containerd-shim-runc"; },
    { name = "systemd";           regex = "^/sbin/init|^/lib/systemd/systemd"; },

    # ── базы данных и брокеры ────────────────────────────────────────
    { name = "clickhouse";        regex = "^clickhouse|clickhouse-server|clickhouse-keeper|clickhouse-client"; },
    { name = "kafka";             regex = "/kafka|kafka\\.Kafka|cp-kafka|kafka-connect|schema-registry|ksql"; },
    { name = "redis";             regex = "^redis-server |redis_exporter"; },
    { name = "postgres";          regex = "^postgres:|/bin/postgres "; },
    { name = "minio";             regex = "/usr/bin/minio|minio server"; },

    # ── мониторинг и observability ───────────────────────────────────
    { name = "prometheus";        regex = "/bin/prometheus "; },
    { name = "grafana";           regex = "^grafana |/run\\.sh"; },
    { name = "node_exporter";     regex = "node_exporter"; },
    { name = "nginx_exporter";    regex = "nginx-prometheus-exporter"; },
    { name = "blackbox_exporter"; regex = "blackbox_exporter"; },
    { name = "mysqld_exporter";   regex = "mysqld_exporter"; },
    { name = "kafka_exporter";    regex = "kafka_exporter"; },
    { name = "docker_exporter";   regex = "docker-prometheus-exporter"; },
    { name = "fluentbit";         regex = "/fluent-bit"; },
    { name = "process_metrics";   regex = "/process_metrics "; },

    # ── apps ─────────────────────────────────────────────────────────
    { name = "node";              regex = "/node "; },
    { name = "java";              regex = "^java |/bin/java "; },
    { name = "python";            regex = "^python|/bin/python"; },

    # ── исключения (ignore = true: не отслеживать) ────────────────────
    # { name = "cgroup_sync";      regex = "cgroup_sync"; ignore = true; },

    # ── скрипты и утилиты ────────────────────────────────────────────
    { name = "script";            regex = "^-?bash|^/bin/bash|^/bin/sh |^awk |^date|^tr |^grep |^ps |^ip |^nmap|^df |^du |^rm |^mkdir |^head |^make|^vim|^git |^chown|^chmod|^sudo |^ls |^cp |^cat |^apt|^yum|^sort |^find |^mv |^wc |^tar |^curl |^wget|^unzip|^gzip|^htop|^xz|^tail |^sleep "; },

    # ── ловушка: всё что не попало выше ──────────────────────────────
    { name = "other";             regex = "."; }
);

# ── BPF ring buffer'ы ────────────────────────────────────────────
#
# Размеры кольцевых буферов для передачи событий из ядра в userspace.
# Значения в байтах, автоматически округляются до степени 2 (минимум 4096).
# Каждый буфер аллоцируется ядром при загрузке BPF и НЕ учитывается
# в cgroup memory лимитах процесса.
#
# Дефолтные размеры выдерживают 35K+ TCP conn/sec (стресс-тест: 1M
# соединений за 30с, 16 воркеров, полный трекинг) с 0 drops.
# Увеличивайте только при появлении "ringbuf drops" в логах (WARN).
#
# ring_buffers = {
#     proc   = 2097152;    # 2 МБ — fork/exec/exit/oom_kill (дефолт)
#     file   = 2097152;    # 2 МБ — file_close (дефолт)
#     net    = 4194304;    # 4 МБ — net_listen/connect/accept/close, signal (дефолт)
#     sec    = 1048576;    # 1 МБ — tcp_retrans, syn_recv, rst_sent/recv (дефолт)
#     cgroup = 131072;     # 128 КБ — cgroup mkdir/rmdir (дефолт)
# };

# ── Коллекторы (включаемые/отключаемые источники метрик) ───────────
#
# Каждый коллектор можно независимо включить или отключить.
# Отключение снижает накладные расходы CPU/памяти от неиспользуемых BPF-программ.

# Метрики cgroup v2 — чтение memory.max, memory.current, memory.swap.current,
# cpu.weight, pids.current из /sys/fs/cgroup для каждой отслеживаемой cgroup.
# Поддерживается автоматический резолвинг Docker-контейнеров (см. docker ниже).
# По умолчанию: true.
cgroup_metrics = true;

# ── Сетевой трекинг ──────────────────────────────────────────────
#
# Отслеживание TCP/UDP-соединений отслеживаемых процессов через
# kprobes/kretprobes. Объединяет события жизненного цикла соединений
# и security-пробы в одном месте, т.к. они используют общую
# инфраструктуру (sock_map, open_conn_map).
#
# События:
#   net_close      — закрытие TCP-соединения (адреса, порты, байты, длительность)
#   conn_snapshot  — снимок каждого живого TCP-соединения (с тем же timestamp что snapshot)
#   tcp_retrans    — TCP-ретрансмиссия (потеря пакетов, перегрузка)
#   syn_recv       — входящий SYN-пакет (SYN flood detection)
#   rst_sent       — отправлен TCP RST (включая SO_LINGER=0)
#   rst_recv       — получен TCP RST (сканирование портов, connection refused)
#   udp_agg        — агрегация UDP пакетов/байтов по (remote_addr, port)
#
# ПРИМЕЧАНИЕ: tcp_retransmit, syn_tracking, rst_tracking, open_conn_count
# автоматически включают инфраструктуру отслеживания сокетов (sock_map),
# даже если enabled = false. enabled управляет только генерацией
# net_close/conn_snapshot событий.

net_tracking = {
    # Включить net_close и conn_snapshot события.
    enabled = true;

    # ── Per-connection/socket метрики ────────────────────────────

    # TCP: tx/rx байты и количество вызовов sendmsg/recvmsg на каждое соединение.
    # Поля: net_conn_tx_bytes, net_conn_rx_bytes, net_conn_tx_calls, net_conn_rx_calls.
    # Увеличивает нагрузку: +2 kprobes (tcp_sendmsg, tcp_recvmsg).
    tcp_bytes = true;

    # UDP: агрегация tx/rx байтов и пакетов по (remote_addr, port) каждый snapshot.
    # Событие: udp_agg. Для обнаружения UDP flood, DNS amplification.
    # +2 kprobes (udp_sendmsg, udp_recvmsg).
    udp_bytes = true;

    # ── TCP security-события ─────────────────────────────────────

    # TCP-ретрансмиссия (потеря пакетов, перегрузка, DDoS).
    # Событие: tcp_retrans. Содержит: адреса, порты, TCP state.
    tcp_retransmit = true;

    # Входящий SYN-пакет (SYN flood detection).
    # Событие: syn_recv. Содержит: source/dest адреса, порты.
    tcp_syn = true;

    # TCP RST отправленные/полученные (сканирование портов, отказы).
    # События: rst_sent, rst_recv. Содержат: адреса, порты, direction.
    tcp_rst = true;

    # Счётчик активных TCP-соединений на процесс.
    # Поле: open_tcp_conns в snapshot. Для обнаружения утечки соединений.
    tcp_open_conns = true;
};

# Файловый трекинг — отслеживание событий open/close файлов через eBPF-трейспоинты
# на системных вызовах openat/close/read/write. Агрегирует по fd, генерирует
# событие file_close при закрытии.
# ПРИМЕЧАНИЕ: это самый дорогой коллектор (~3-4% CPU). Отключите, если не нужен.
file_tracking = {
    enabled = true;
    # Учитывать количество байтов read/write на каждый fd.
    # Увеличивает нагрузку за счёт дополнительных tracepoints.
    track_bytes = true;
    # Белый список префиксов путей — если не пуст, отслеживаются только совпадающие пути.
    # Пустой include = всё, кроме exclude.
    include = ( "/app/docker/volumes", "/app/docker/compose",
                "/home", "/var/lib", "/etc", "/workspaces" );
    # Чёрный список префиксов путей — всегда исключаются, независимо от include.
    exclude = ( "/proc", "/sys", "/dev", "/run", "/tmp",
                "/etc/ld.so.cache", "/etc/passwd", "/etc/group",
                "/etc/nsswitch.conf", "/etc/localtime",
                "/etc/hosts", "/etc/resolv.conf",
                "/etc/host.conf", "/etc/gai.conf",
                "/etc/ssl/certs",
                "/var/lib/containerd",
                "/var/lib/docker/overlay2",
                "/var/lib/docker/image",
                "/app/process_metrics" );
};

# ── Disk tracking ─────────────────────────────────────────────────
#
# Мониторинг заполненности дисков. Каждый snapshot_interval собирает
# информацию через statvfs() для каждой уникальной точки монтирования.
# Генерирует события disk_usage с полями: device (comm), mount_point (file_path),
# fs_type (sec_remote_addr), disk_total_bytes, disk_used_bytes, disk_avail_bytes.
# Дедуплицирует bind-mount'ы одного устройства.
#
# Стоимость: практически нулевая (~0.1 мс на все файловые системы).
disk_tracking = {
    enabled = true;

    # Типы файловых систем для мониторинга.
    # По умолчанию: ext2, ext3, ext4, xfs, btrfs, vfat, zfs, ntfs, fuseblk, f2fs.
    # fs_types = ( "ext4", "xfs", "btrfs" );

    # Белый список префиксов точек монтирования.
    # include = ( "/" );

    # Чёрный список — исключить точки монтирования по префиксу.
    exclude = ( "/boot/efi" );
};

# ── Docker resolve ────────────────────────────────────────────────
#
# Автоматический резолвинг имён Docker-контейнеров по cgroup path.
# В cgroup path вида "system.slice/docker-<hash>.scope" хэш заменяется
# на имя контейнера: "docker/<container_name>".
# Кэш обновляется каждый snapshot_interval.
#
# Работает без Docker socket — читает hostname файлы напрямую из overlay2.
# data_root определяется автоматически из daemon_json (ключ "data-root"),
# fallback: /var/lib/docker.

docker = {
    resolve_names = true;
    # data_root = "/app/docker/data";
    # daemon_json = "/etc/docker/daemon.json";
};

# ── ICMP tracking ────────────────────────────────────────────────
#
# Глобальная агрегация ICMP-пакетов (не привязана к процессам).
# Событие: icmp_agg. Содержит: src_addr, icmp_type, icmp_code, count.
# Для обнаружения ICMP flood, ping sweep.
icmp_tracking = true;

# ── Настройки снимков ─────────────────────────────────────────────

# Обновлять cmdline и comm из /proc при каждом цикле снимка.
# Ловит процессы, которые меняют свой argv после exec (например, postgres, nginx).
# По умолчанию: true.
refresh_proc = true;

# ── HTTP pull-сервер ──────────────────────────────────────────────
#
# Встроенный HTTP/1.1 сервер с кольцевым буфером в памяти.
# Disk I/O на горячем пути отсутствует — все данные в RAM.
# Отсутствие этой секции отключает сервер.
#
# Эндпоинты:
#   GET /metrics                    — все накопленные события в CSV (только чтение)
#   GET /metrics?format=csv         — то же (явный формат)
#   GET /metrics?format=csv&clear=1 — CSV + очистка буфера после отдачи
#                                     (используйте этот URL в ClickHouse url())
#
# При переполнении буфера старые события перезатираются (кольцевая семантика).
# Чтобы избежать потерь, ClickHouse должен забирать данные чаще, чем буфер
# заполняется. Формула: max_buffer_size / (sizeof(record) × events_per_sec).
#
# Резолвинг UID → username:
#   При отдаче CSV автоматически подставляются текстовые имена пользователей
#   вместо числовых UID. Используется NSS (getpwuid_r), что поддерживает
#   LDAP, SSSD, NIS и локальные /etc/passwd. Результаты кэшируются.
#   Столбцы: user_name (из uid), login_name (из loginuid), euser_name (из euid).
#   loginuid=4294967295 (не установлен) пишется как "AUDIT_UID_UNSET".
#
# Оптимизация:
#   Используется TCP_CORK + userspace буферизация (128 КБ чанки)
#   для минимизации количества syscall'ов и оптимальной упаковки TCP-сегментов.

http_server = {
    port = 10003;
    bind = "0.0.0.0";

    # Максимальное количество одновременных HTTP-подключений.
    # При превышении лимита новые подключения сразу закрываются.
    # По умолчанию: 1.
    max_connections = 1;

    # Размер кольцевого буфера в байтах.
    # Делится на sizeof(ef_record) ≈ 2760 байт для получения ёмкости.
    # 256 МБ ≈ 97000 записей. При snapshot_interval=60 и ~1500 PIDs
    # это хватает на ~4 интервала без потерь.
    # ВАЖНО: этот буфер размещается в RAM, влияет на потребление памяти.
    # По умолчанию: 268435456 (256 МБ).
    max_buffer_size = 268435456;
};
