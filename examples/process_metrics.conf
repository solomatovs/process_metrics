# process_metrics — main configuration file (libconfig format)
#
# Usage: ./process_metrics -c process_metrics.conf

# ── General ──────────────────────────────────────────────────────────

# Server identifier (used in prom labels and CSV hostname column)
# Defaults to system hostname if not set.
# hostname = "my-server-01";

# Snapshot interval in seconds (how often live process metrics are collected)
# Lower values give finer granularity but increase CPU/IO. 3s is a good default
# for interactive dashboards, 30s for low-overhead production monitoring.
snapshot_interval = 3;

# Prometheus metric prefix (prepended to all metric names)
metric_prefix = "process_metrics";

# Max args length in output (truncated with "...")
cmdline_max_len = 500;

# Exec event rate limit per second (0 = unlimited)
exec_rate_limit = 0;

# Log level: 0 = errors only, 1 = info (default), 2 = debug
# log_level = 1;

# ── Tracking rules ──────────────────────────────────────────────────
#
# List of { name, regex } objects.
# Regex applies to the full command line of a process.
# When matched, the process and all its descendants are tracked.
# Reloaded on SIGHUP without restart.
#
# Tip: put a catch-all rule { name = "other"; regex = "."; } last
# to monitor everything. Specific rules should go first — first match wins.

rules = (
    { name = "sshd";     regex = "/usr/sbin/sshd"; },
    { name = "nginx";    regex = "^nginx"; },
    { name = "dockerd";  regex = "/usr/bin/dockerd"; },
    { name = "node";     regex = "^node "; },
    # catch-all: matches any process not caught above
    { name = "other";    regex = "."; }
);

# ── Collectors (toggleable metric sources) ───────────────────────────
#
# Each collector can be independently enabled/disabled.
# Disabling reduces CPU/memory overhead from unused BPF programs.

# Cgroup v2 metrics — read memory.max, memory.current, cpu.weight, pids.current
# from /sys/fs/cgroup for each tracked cgroup. (default: true)
cgroup_metrics = true;

# Network tracking — track TCP connection lifecycle (connect/accept/close)
# via kprobes/kretprobes on tcp_v4_connect, tcp_v6_connect, inet_csk_accept,
# tcp_close. Emits net_close events with IP addresses and ports.
# Per-process aggregate byte counters (net_tx_bytes/net_rx_bytes in snapshots)
# are always available when enabled.
net_tracking = {
    enabled = true;
    # Also track send/recv byte counts per connection (higher overhead).
    track_bytes = false;
};

# File tracking — track file open/close events via eBPF tracepoints on
# openat/close/read/write syscalls. Aggregates per fd, emits event on close.
# NOTE: this is the most expensive collector (~3-4% CPU). Disable if not needed.
file_tracking = {
    enabled = true;
    # Also track read/write byte counts per fd (higher overhead).
    track_bytes = false;
    # Path prefix whitelist — if non-empty, only matching paths are tracked.
    include = ( "/home", "/opt", "/srv", "/var/lib", "/etc" );
    # Path prefix blacklist — always excluded regardless of include list.
    # Supports both directory prefixes and exact file paths.
    # System files read by every process (glibc, NSS) should be excluded
    # to reduce noise and overhead.
    exclude = ( "/proc", "/sys", "/dev", "/run", "/tmp",
                "/etc/ld.so.cache", "/etc/passwd", "/etc/group",
                "/etc/nsswitch.conf", "/etc/localtime",
                "/etc/hosts", "/etc/resolv.conf",
                "/etc/host.conf", "/etc/gai.conf" );
};

# ── Snapshot tuning ─────────────────────────────────────────────────

# Refresh cmdline and comm from /proc on each snapshot cycle.
# Catches processes that change their argv after exec (e.g. postgres, nginx).
# (default: true)
refresh_proc = true;

# ── HTTP pull server ────────────────────────────────────────────────
#
# Omit this section to disable.
# Accumulates events to a binary file and serves them via HTTP on demand.
#
# Endpoints:
#   GET /metrics?format=csv        — all accumulated events as CSV (read-only)
#   GET /metrics?format=csv&clear=1 — same + clear buffer after delivery
#                                      (use this URL in ClickHouse MV)
#   GET /metrics?format=prom       — current Prometheus metrics snapshot
#                                      (not cleared, overwritten each snapshot cycle)
#
# Two-phase delivery (clear=1 mode):
#   swap → send → commit. If delivery fails (broken connection),
#   data is preserved in .pending file and retried on next request.

http_server = {
    port = 9091;
    bind = "0.0.0.0";
    data_file = "/var/lib/process_metrics/events.dat";
};
