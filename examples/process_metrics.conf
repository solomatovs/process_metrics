# process_metrics — основной файл конфигурации (формат libconfig)
#
# Запуск: ./process_metrics -c process_metrics.conf

# ── Общие настройки ────────────────────────────────────────────────

# Идентификатор сервера (используется в prom-метках и столбце hostname CSV)
# По умолчанию берётся системное имя хоста.
# hostname = "my-server-01";

# Интервал снимков в секундах (как часто собираются метрики живых процессов)
# Меньшие значения дают более высокую детализацию, но увеличивают CPU/IO.
# 3 сек — хорошо для интерактивных дашбордов, 30 сек — для продакшн-мониторинга
# с минимальными накладными расходами.
snapshot_interval = 3;

# Префикс Prometheus-метрик (добавляется ко всем именам метрик)
metric_prefix = "process_metrics";

# Максимальная длина аргументов командной строки в выводе (обрезается с "...")
cmdline_max_len = 500;

# Ограничение частоты событий exec в секунду (0 = без ограничения)
exec_rate_limit = 0;

# Уровень логирования: 0 = только ошибки, 1 = информация (по умолчанию), 2 = отладка
# log_level = 1;

# ── Правила отслеживания ──────────────────────────────────────────
#
# Список объектов { name, regex }.
# Регулярное выражение применяется к полной командной строке процесса
# (содержимое /proc/<pid>/cmdline — путь к исполняемому файлу + аргументы).
# При совпадении процесс и все его потомки начинают отслеживаться.
# Перезагружаются по SIGHUP без перезапуска.
#
# Совет: добавьте правило-ловушку { name = "other"; regex = "."; } последним,
# чтобы отслеживать всё. Более конкретные правила должны идти первыми —
# срабатывает первое совпадение.

rules = (
    { name = "sshd";     regex = "sshd"; },
    { name = "nginx";    regex = "nginx"; },
    { name = "dockerd";  regex = "dockerd"; },
    { name = "sssd";  regex = "sssd"; },
    { name = "node_exporter";     regex = "node_exporter"; },
    { name = "postgres";     regex = "postgres"; },
    { name = "clickhouse";     regex = "clickhouse"; },
    { name = "node";     regex = "node"; },
    { name = "java";     regex = "java"; },
    { name = "nginx";     regex = "nginx"; },
    { name = "prometheus";     regex = "prometheus"; },
    { name = "grafana";     regex = "grafana"; },
    { name = "airflow";     regex = "airflow|celery|redis"; },
    { name = "python";     regex = "python"; },
    { name = "kasper";     regex = "kesl|klnagent|ksnproxy|wdserver|klcsexec"; },
    { name = "script";     regex = "bash|sh|awk|date|tr|grep|ps|ip|nmap|df|du|rm|mkdir|head|make|vim|git|chown|chmod|sudo|ls|cp|cat|apt|yum|sort|find|mv|wc|tar|curl|unzip|gzip|htop|xz"; },
    # правило-ловушка: совпадает с любым процессом, не пойманным выше
    { name = "other";    regex = "."; }
);

# ── Коллекторы (включаемые/отключаемые источники метрик) ───────────
#
# Каждый коллектор можно независимо включить или отключить.
# Отключение снижает накладные расходы CPU/памяти от неиспользуемых BPF-программ.

# Метрики cgroup v2 — чтение memory.max, memory.current, cpu.weight, pids.current
# из /sys/fs/cgroup для каждой отслеживаемой cgroup. (по умолчанию: true)
cgroup_metrics = true;

# Сетевой трекинг — отслеживание жизненного цикла TCP-соединений
# (connect/accept/close) через kprobes/kretprobes на tcp_v4_connect,
# tcp_v6_connect, inet_csk_accept, tcp_close.
# Генерирует события net_close с IP-адресами и портами.
# Агрегированные счётчики байтов на процесс (net_tx_bytes/net_rx_bytes
# в snapshot'ах) всегда доступны при включённом трекинге.
net_tracking = {
    enabled = true;
    # Также учитывать количество байтов send/recv на соединение (выше нагрузка).
    track_bytes = false;
};

# Файловый трекинг — отслеживание событий open/close файлов через eBPF-трейспоинты
# на системных вызовах openat/close/read/write. Агрегирует по fd, генерирует
# событие при закрытии.
# ПРИМЕЧАНИЕ: это самый дорогой коллектор (~3-4% CPU). Отключите, если не нужен.
file_tracking = {
    enabled = true;
    # Также учитывать количество байтов read/write на fd (выше нагрузка).
    track_bytes = false;
    # Белый список префиксов путей — если не пуст, отслеживаются только совпадающие пути.
    include = ( "/home", "/opt", "/srv", "/var/lib", "/etc", "/app", "/data", "/pgsql" );
    # Чёрный список префиксов путей — всегда исключаются, независимо от include.
    # Поддерживает как префиксы каталогов, так и точные пути к файлам.
    # Системные файлы, читаемые каждым процессом (glibc, NSS), следует исключить
    # для снижения шума и нагрузки.
    exclude = ( "/proc", "/sys", "/dev", "/run", "/tmp",
                "/etc/ld.so.cache", "/etc/passwd", "/etc/group",
                "/etc/nsswitch.conf", "/etc/localtime",
                "/etc/hosts", "/etc/resolv.conf",
                "/etc/host.conf", "/etc/gai.conf" );
};

# ── Настройки снимков ─────────────────────────────────────────────

# Обновлять cmdline и comm из /proc при каждом цикле снимка.
# Ловит процессы, которые меняют свой argv после exec (например, postgres, nginx).
# (по умолчанию: true)
refresh_proc = true;

# ── HTTP pull-сервер ──────────────────────────────────────────────
#
# Отсутствие этой секции отключает сервер.
# Накапливает события в бинарный файл и отдаёт их по HTTP по запросу.
#
# Эндпоинты:
#   GET /metrics?format=csv        — все накопленные события в формате CSV (только чтение)
#   GET /metrics?format=csv&clear=1 — то же + очистка буфера после отдачи
#                                      (используйте этот URL в ClickHouse MV)
#   GET /metrics?format=prom       — текущий снимок Prometheus-метрик
#                                      (не очищается, перезаписывается каждый цикл)
#
# Двухфазная доставка (режим clear=1):
#   swap → send → commit. При сбое доставки (обрыв соединения)
#   данные сохраняются в .pending-файле и повторяются при следующем запросе.

http_server = {
    port = 9091;
    bind = "0.0.0.0";
    data_file = "/var/lib/process_metrics/events.dat";
};
