# process_metrics — основной файл конфигурации (формат libconfig)
#
# Запуск: ./process_metrics -c process_metrics.conf

# ── Общие настройки ────────────────────────────────────────────────

# Идентификатор сервера (используется в столбце hostname CSV).
# По умолчанию берётся системное имя хоста.
# hostname = "my-server-01";

# Интервал снимков в секундах (как часто собираются метрики живых процессов).
# Рекомендации:
#   3-10 сек  — интерактивные дашборды, отладка
#   30-60 сек — production-мониторинг с минимальными накладными расходами
snapshot_interval = 3;

# Интервал обновления /proc данных (секунды). По умолчанию = snapshot_interval.
# Чем чаще — тем быстрее обнаруживаются новые процессы и обновляются cmdline.
refresh_interval = 1;

# Ограничение частоты событий exec в секунду (0 = без ограничения).
# При fork-storm'ах отбрасывает лишние exec-события в BPF ring buffer.
exec_rate_limit = 0;

# Уровень логирования: 0 = только ошибки, 1 = информация, 2 = отладка
log_level = 1;

# Максимум cgroup в кэше (по умолчанию 4096).
# max_cgroups = 4096;

# Интервал heartbeat-лога в секундах (0 = отключить).
heartbeat_interval = 30;

# Управление логированием отдельных компонентов.
log_snapshot = true;
log_refresh  = false;

# ── Правила отслеживания ──────────────────────────────────────────
#
# Список объектов { name, regex, ignore }.
# Регулярное выражение применяется к полной командной строке процесса
# (/proc/<pid>/cmdline). При совпадении процесс и потомки отслеживаются.
# Первое совпадение побеждает. Перезагружаются по SIGHUP.

rules = (
    # ── инфраструктура хоста ─────────────────────────────────────────
    { name = "sshd";              regex = "sshd:? "; },
    { name = "sssd";              regex = "sssd"; },
    { name = "nginx";             regex = "^nginx: "; },
    { name = "dockerd";           regex = "/usr/bin/dockerd"; },
    { name = "containerd";        regex = "/usr/bin/containerd"; },
    { name = "docker-proxy";      regex = "/usr/bin/docker-proxy"; },
    { name = "containerd-shim";   regex = "containerd-shim-runc"; },
    { name = "systemd";           regex = "^/sbin/init|^/lib/systemd/systemd"; },

    # ── базы данных и брокеры ────────────────────────────────────────
    { name = "clickhouse";        regex = "^clickhouse|clickhouse-server|clickhouse-keeper|clickhouse-client"; },
    { name = "kafka";             regex = "/kafka|kafka\\.Kafka|cp-kafka|kafka-connect|schema-registry|ksql"; },
    { name = "redis";             regex = "^redis-server |redis_exporter"; },
    { name = "postgres";          regex = "^postgres[: ]|/bin/postgres "; },
    { name = "minio";             regex = "/usr/bin/minio|minio server"; },

    # ── мониторинг и observability ───────────────────────────────────
    { name = "prometheus";        regex = "/bin/prometheus "; },
    { name = "grafana";           regex = "^grafana |/run\\.sh"; },
    { name = "node_exporter";     regex = "node_exporter"; },
    { name = "nginx_exporter";    regex = "nginx-prometheus-exporter"; },
    { name = "blackbox_exporter"; regex = "blackbox_exporter"; },
    { name = "mysqld_exporter";   regex = "mysqld_exporter"; },
    { name = "kafka_exporter";    regex = "kafka_exporter"; },
    { name = "docker_exporter";   regex = "docker-prometheus-exporter"; },
    { name = "fluentbit";         regex = "/fluent-bit"; },
    { name = "process_metrics";   regex = "/process_metrics "; },

    # ── airflow ──────────────────────────────────────────────────────
    { name = "airflow";           regex = "airflow |gunicorn.*airflow|celeryd:.*celery worker"; },

    # ── apps ─────────────────────────────────────────────────────────
    { name = "node";              regex = "/node "; },
    { name = "java";              regex = "^java |/bin/java "; },
    { name = "python";            regex = "^python|/bin/python"; },

    # ── исключения (ignore = true: не отслеживать) ────────────────────
    # { name = "cgroup_sync";      regex = "cgroup_sync"; ignore = true; },

    # ── скрипты и утилиты ────────────────────────────────────────────
    { name = "script";            regex = "^-?bash|^/bin/bash|^/bin/sh |^awk |^date|^tr |^grep |^ps |^ip |^nmap|^df |^du |^rm |^mkdir |^head |^make|^vim|^git |^chown|^chmod|^sudo |^ls |^cp |^cat |^apt|^yum|^sort |^find |^mv |^wc |^tar |^curl |^wget|^unzip|^gzip|^htop|^xz|^tail |^sleep "; },
);

# ── Управление перехватом syscall/tracepoint ─────────────────────
#
# Каждая настройка — уровень активации конкретного syscall/tracepoint:
#
#   0 = bpf_enable       — BPF-программа отключена (не загружается в ядро).
#                           Перехват syscall полностью выключен.
#
#   1 = bpf_event_enable — BPF-программа загружена, событие генерируется
#                           в ring buffer. Userspace обрабатывает событие
#                           (state management), но НЕ отправляет в CSV.
#
#   2 = event_enable     — полный pipeline: BPF перехват + ring buffer
#                           событие + отправка в CSV.
#
# Имя настройки = имя перехватываемого syscall/tracepoint в ядре.
# По умолчанию все = 2 (полный pipeline).

# ── Процессные события ───────────────────────────────────────────

process_event = {
    ring_buffer_size   = 100663296;  # 96 МБ (~23K events × 4320B)

    sched_process_exec = 2;   # min: 1. tracepoint/sched/sched_process_exec
    sched_process_fork = 2;   # min: 1. raw_tracepoint/sched_process_fork
    sched_process_exit = 2;   # min: 1. tracepoint/sched/sched_process_exit
    mark_victim        = 2;   # min: 1. raw_tracepoint/mark_victim (OOM kill)
    sched_switch       = 2;   # min: 1. tracepoint/sched/sched_switch (CPU/RSS/IO)
    signal_generate    = 2;   # raw_tracepoint/signal_generate
    sys_chdir          = 2;   # tracepoint/syscalls/sys_exit_(f)chdir
};

# ── Файловые события ─────────────────────────────────────────────

file_event = {
    ring_buffer_size     = 100663296;  # 96 МБ (~46K events × 2152B)
    ring_buffer_ops_size = 1048576;    # 1 МБ — chmod/chown (~480 events × 2152B)
    absolute_paths_only  = true;

    include = (
        "/app/docker/volumes",
        "/app/docker/compose",
        "/home",
        "/var/lib",
        "/etc",
        "/workspaces"
    );
    exclude = ( "/proc", "/sys", "/dev", "/run", "/tmp",
                "/etc/ld.so.cache", "/etc/passwd", "/etc/group",
                "/etc/nsswitch.conf", "/etc/localtime",
                "/etc/hosts", "/etc/resolv.conf",
                "/etc/host.conf", "/etc/gai.conf",
                "/etc/ssl/certs",
                "/var/log"
    );

    sys_openat     = 0;   # tracepoint/syscalls/sys_enter/exit_openat
    sys_close      = 0;   # tracepoint/syscalls/sys_enter_close
    sys_read       = 2;   # tracepoint/syscalls/sys_enter/exit_read
    sys_pread64    = 2;   # tracepoint/syscalls/sys_enter/exit_pread64
    sys_readv      = 2;   # tracepoint/syscalls/sys_enter/exit_readv
    sys_write      = 2;   # tracepoint/syscalls/sys_enter/exit_write
    sys_pwrite64   = 2;   # tracepoint/syscalls/sys_enter/exit_pwrite64
    sys_writev     = 2;   # tracepoint/syscalls/sys_enter/exit_writev
    sys_sendfile64 = 2;   # tracepoint/syscalls/sys_enter/exit_sendfile64
    sys_fsync      = 2;   # tracepoint/syscalls/sys_enter_fsync
    sys_fdatasync  = 2;   # tracepoint/syscalls/sys_enter_fdatasync
    sys_rename     = 2;   # tracepoint/syscalls/sys_enter_rename + renameat2
    sys_unlink     = 2;   # tracepoint/syscalls/sys_enter_unlink + unlinkat
    sys_truncate   = 2;   # tracepoint/syscalls/sys_enter_truncate + ftruncate
    sys_fchmodat   = 2;   # tracepoint/syscalls/sys_enter_fchmodat
    sys_fchownat   = 2;   # tracepoint/syscalls/sys_enter_fchownat
};

# ── Сетевые события ──────────────────────────────────────────────

net_event = {
    ring_buffer_size     = 100663296;  # 96 МБ (~730K events × 136B)
    ring_buffer_sec_size = 1048576;    # 1 МБ — retransmit/syn/rst (~12K events × 88B)
    tcp_open_conns       = true;       # счётчик активных TCP-соединений на процесс

    inet_csk_listen_start = 2;   # kprobe/inet_csk_listen_start
    tcp_connect           = 2;   # kprobe/kretprobe tcp_v4_connect + tcp_v6_connect
    inet_csk_accept       = 2;   # kretprobe/inet_csk_accept
    tcp_close             = 2;   # kprobe/kretprobe tcp_close
    tcp_sendmsg           = 2;   # kprobe/kretprobe tcp_sendmsg
    tcp_recvmsg           = 2;   # kprobe/kretprobe tcp_recvmsg
    udp_sendmsg           = 2;   # kprobe/kretprobe udp_sendmsg
    udp_recvmsg           = 2;   # kprobe/kretprobe udp_recvmsg
    tcp_retransmit_skb    = 2;   # raw_tracepoint/tcp_retransmit_skb
    tcp_conn_request      = 2;   # kprobe/tcp_conn_request (SYN recv)
    tcp_send_reset        = 2;   # tcp_send_reset + tcp_send_active_reset
    tcp_receive_reset     = 2;   # raw_tracepoint/tcp_receive_reset
    icmp_rcv              = 2;   # kprobe/icmp_rcv (агрегация в icmp_agg_map)
    sys_socket            = 2;   # tracepoint/syscalls/sys_enter_socket
};

# ── Cgroup события ───────────────────────────────────────────────

cgroup_event = {
    ring_buffer_size         = 131072;   # 128 КБ (~400 events × 312B)

    cgroup_mkdir             = 2;   # tracepoint/cgroup/cgroup_mkdir
    cgroup_rmdir             = 2;   # tracepoint/cgroup/cgroup_rmdir
    cgroup_rename            = 2;   # tracepoint/cgroup/cgroup_rename
    cgroup_release           = 2;   # tracepoint/cgroup/cgroup_release
    cgroup_attach_task       = 2;   # tracepoint/cgroup/cgroup_attach_task
    cgroup_transfer_tasks    = 2;   # tracepoint/cgroup/cgroup_transfer_tasks
    cgroup_notify_populated  = 2;   # tracepoint/cgroup/cgroup_notify_populated
    cgroup_notify_frozen     = 2;   # tracepoint/cgroup/cgroup_notify_frozen
    cgroup_freeze            = 0;   # default: 0 (kernel compat, layout может отличаться)
    cgroup_unfreeze          = 0;   # default: 0 (kernel compat, layout может отличаться)
};

# ── Userspace-коллекторы (не BPF) ────────────────────────────────

# Метрики cgroup v2 — чтение memory.max, memory.current, memory.swap.current,
# cpu.weight, pids.current из /sys/fs/cgroup для каждой отслеживаемой cgroup.
cgroup_metrics = true;

# Мониторинг заполненности дисков через statvfs().
# Стоимость: ~0.1 мс на все файловые системы.
disk_metrics = {
    enabled = true;

    # Типы файловых систем для мониторинга.
    # По умолчанию: ext2, ext3, ext4, xfs, btrfs, vfat, zfs, ntfs, fuseblk, f2fs.
    # fs_types = ( "ext4", "xfs", "btrfs" );

    # Белый список префиксов точек монтирования.
    # include = ( "/" );

    # Чёрный список — исключить точки монтирования по префиксу.
    exclude = ( "/boot/efi" );
};

# ── Docker resolve ────────────────────────────────────────────────
#
# Резолвинг имён Docker-контейнеров по cgroup path.
# Работает без Docker socket — читает hostname из overlay2.

docker = {
    resolve_names = true;
    # data_root = "/app/docker/data";
    # daemon_json = "/etc/docker/daemon.json";
};

# Обновлять cmdline и comm из /proc при каждом цикле снимка.
refresh_proc = true;

# ── HTTP pull-сервер ──────────────────────────────────────────────
#
# Встроенный HTTP/1.1 сервер с кольцевым буфером в памяти.
#
# Эндпоинты:
#   GET /metrics                    — все события в CSV
#   GET /metrics?format=csv&clear=1 — CSV + очистка буфера (для ClickHouse url())

http_server = {
    port = 10004;
    bind = "0.0.0.0";
    max_connections = 1;
    log_requests = false;

    # Белый список IP-адресов/подсетей в формате CIDR.
    # allow = ( "127.0.0.1", "10.0.0.0/8", "192.168.0.0/16" );

    # Размер кольцевого буфера (256 МБ ≈ 97000 записей).
    max_buffer_size = 268435456;
};
